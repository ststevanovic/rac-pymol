<!-- ── right-pane.html · console + event log ─────────────────── -->
<div id="right">
  <div id="cbe-wrap">

    <div id="cbe-label">
      <span>server</span>
      <span class="cbe-status" id="cbe-status">idle</span>
    </div>

    <div id="cbe">
      <span id="cbe-placeholder">▌ Console output will appear here once the render job starts.</span>
    </div>

    <div id="cbe-actions">
      <button class="cbe-btn-main" id="btn-html-view"
              disabled onclick="openHtmlView()">HTML View</button>
    </div>

    <div id="cbe-wait"
         style="display:none;padding:5px 14px;font-size:11px;
                font-family:'JetBrains Mono',monospace;color:#b078a8;
                background:var(--cbe-bg);border-top:1px solid #3a1050;">
      please wait…
    </div>

    <div id="event-log">
      <div class="ev-line">Ready.</div>
    </div>

  </div>
</div>
