<!-- ── confirm-overlay.html · dispatch confirmation dialog ──── -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <h2>Confirm Render</h2>
    <p>This will dispatch a GitHub Actions workflow. Please review the parameters:</p>
    <div class="confirm-params" id="confirm-params-text"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-go"     onclick="executeRender()">Run</button>
    </div>
  </div>
</div>

<!-- ── PAT input overlay ─────────────────────────────────────── -->
<div id="pat-overlay">
  <div id="pat-box">
    <h2>GitHub Token</h2>
    <p>Stored in <code>sessionStorage</code> only — never sent anywhere except the GitHub API.</p>
    <div class="pat-field">
      <input type="password" id="pat-input" placeholder="ghp_…"
             autocomplete="off" spellcheck="false"
             onkeydown="if(event.key==='Enter')submitPat()">
      <button class="pat-eye" id="pat-eye" onclick="togglePatEye()"
              title="Show / hide">&#128065;</button>
    </div>
    <div class="confirm-actions" style="margin-top:14px">
      <button class="btn-cancel" onclick="cancelPat()">Cancel</button>
      <button class="btn-go"     onclick="submitPat()">Continue</button>
    </div>
  </div>
</div>
