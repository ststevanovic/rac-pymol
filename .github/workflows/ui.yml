name: ui

on:
  workflow_dispatch:
    inputs:
      scenography:
        description: "Scenography URL or path"
        required: false
        default: ""
      scene_id:
        description: "Scene ID to render (e.g. 9ax6)"
        required: true
        default: "9ax6"

concurrency:
  group: ui-render
  cancel-in-progress: true

jobs:
  render:
    name: ui Render
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system libs (headless GL + Xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglu1-mesa libosmesa6 xvfb zip

      - name: Create venv + install deps
        run: |
          python -m venv .venv-batch
          .venv-batch/bin/pip install --upgrade pip
          .venv-batch/bin/pip install -e ".[dev]"

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
        env:
          DISPLAY: ":99"

      - name: Resolve scenography DB
        run: bash .github/scripts/curl_wrapper.sh "${SCENOGRAPHY_INPUT}"
        env:
          SCENOGRAPHY_INPUT: ${{ github.event.inputs.scenography }}

      - name: Prepare enzyme reference scene (custom scenography only)
        if: ${{ github.event.inputs.scenography != '' }}
        run: .venv-batch/bin/python pymol-workshop/enzyme.py
        env:
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_GL_VERSION_OVERRIDE: "3.3"

      - name: Run batch + push to gh-pages
        id: batch
        env:
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_GL_VERSION_OVERRIDE: "3.3"
          BATCH_N_SUBJECTS: "2"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash .github/scripts/remote.sh "${{ github.event.inputs.scene_id }}" 2>&1 | tee .rendering/run.log
          echo "run_tag=$(cat .rendering/.last_tag)" >> $GITHUB_OUTPUT

      - name: Signal slides ready
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.batch.outputs.run_tag }}
          DEP_ID=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            -f ref=gh-pages \
            -f environment=render-output \
            -f description="${TAG}" \
            -f auto_merge=false \
            --jq '.id')
          gh api repos/${{ github.repository }}/deployments/${DEP_ID}/statuses \
            --method POST \
            -f state=success \
            -f environment_url="https://${{ github.repository_owner }}.github.io/rac-pymol/${TAG}/slides.html" \
            -f description="${TAG}"

      - name: Upload terminal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: .rendering/run.log
          retention-days: 14

      - name: Upload render artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-artefacts-failure
          path: .rendering/
          retention-days: 7
