name: deploy-ui

on:
  push:
    branches: [main]
  workflow_dispatch: # bootsrap)

concurrency:
  group: deploy-ui
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject PAT_UI into index.html
        run: |
          sed -i "s|__PAT_UI__|${{ secrets.PAT_UI }}|g" .github/index.html

      - name: Push index.html to gh-pages root
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages
          git worktree add /tmp/ghpages origin/gh-pages

          cp .github/index.html /tmp/ghpages/index.html

          cd /tmp/ghpages
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html unchanged on gh-pages, skipping."
            exit 0
          fi
          git commit -m "deploy-ui: update index.html from main@${GITHUB_SHA::7}"
          git push origin HEAD:gh-pages
