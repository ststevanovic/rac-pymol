name: deploy-ui

on:
  push:
    branches: [main]
  workflow_dispatch: # bootsrap)

concurrency:
  group: deploy-ui
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Push index.html + doc/ to gh-pages root
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages
          git worktree add /tmp/ghpages origin/gh-pages

          cp .github/index.html /tmp/ghpages/index.html
          rm -rf /tmp/ghpages/doc
          cp -r .github/doc /tmp/ghpages/doc

          cd /tmp/ghpages
          git add index.html doc/
          git commit --allow-empty -m "deploy-ui: update doc from main@${GITHUB_SHA::7}"
          git push origin HEAD:gh-pages
